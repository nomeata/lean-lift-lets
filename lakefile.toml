name = "lift_lets"
version = "0.1.0"
defaultTargets = ["lift_lets", "LiftLetsTests"]

[[lean_lib]]
name = "LiftLets"

# Build the test suite as part of `lake build`. Each file under `tests/`
# exercises a slice of the library and fails the build if anything breaks.
[[lean_lib]]
name = "LiftLetsTests"
srcDir = "tests"
globs = ["LiftLetsTests.+"]

[[lean_exe]]
name = "lift_lets"
root = "Main"
